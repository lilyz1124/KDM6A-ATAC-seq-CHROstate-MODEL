project: kdm6a_heart_sex_atac
genome: mm10
threads: 8

search:
  encode_terms:
    - "mouse heart ATAC-seq"
    - "mouse heart histone mark"
    - "male female mouse heart ATAC-seq"
  geo_terms:
    - "Kdm6a mouse heart"
    - "Kdm6a knockout heart mouse"
    - "cardiac sex differences mouse RNA-seq"

analysis:
  flank_bp: 100000
  peak_window: 500
  promoter_bp: 2000
  fdr: 0.05
  log2fc_cutoff: 1.0

model:
  hidden_dim: 256
  dropout: 0.2
  lr: 0.0003
  batch_size: 128
  epochs: 40
  seed: 42
  use_atac: true
  use_chromhmm: true
  use_sex: true
  use_perturbation: true

bpnet:
  enabled: false
  input_len: 2114
  output_len: 1000